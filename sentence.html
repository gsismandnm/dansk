<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Cümle Egzersiz</title>

<style>
body { font-family: Arial; padding: 20px; }

.box {
border: 1px solid #ccc;
padding: 15px;
margin-bottom: 15px;
border-radius: 10px;
}

.word {
display: inline-block;
padding: 6px 10px;
margin: 5px;
background: #eee;
cursor: pointer;
border-radius: 5px;
}

.word.correct { background: lightgreen; }
.word.wrong { background: #f8d7da; }

.drop {
border: 2px dashed gray;
min-height: 60px;
padding: 10px;
margin-top: 10px;
}

.correct-text { color: green; }
.wrong-text { color: red; }

.translation {
margin-top: 10px;
font-style: italic;
color: #555;
display: none;
}

button {
margin: 5px;
padding: 6px 10px;
cursor: pointer;
}
</style>
</head>

<body>

<h2>📘 Sætningsøvelser</h2>

<h3>📂 Dosya Seç</h3>
<input type="file" id="fileInput">

<br><br>

<button id="btnOrder" onclick="setMode('order')" disabled>🧩 Arrangement</button>
<button id="btnQuiz" onclick="setMode('quiz')" disabled>📝 Eksamen</button>

<p id="score">Korrekt : 0 | Forkert : 0</p>

<hr>

<div id="app"></div>

<script>

let sentences = [];
let mode = "order";
let correct = 0;
let wrong = 0;


// 📂 DOSYA YÜKLE
document.getElementById("fileInput").addEventListener("change", function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){

        try {
            const text = event.target.result;

            const sandbox = {};
            const func = new Function("sandbox", `
                ${text}
                sandbox.data = defaultSentences;
            `);

            func(sandbox);

            sentences = sandbox.data;

            // butonları aç
            document.getElementById("btnOrder").disabled = false;
            document.getElementById("btnQuiz").disabled = false;

            // reset
            correct = 0;
            wrong = 0;
            updateScore();

            document.getElementById("app").innerHTML = "";

            if(sentences.length > 0){
                newExercise();
            } else {
                document.getElementById("app").innerText = "Cümle yok!";
            }

        } catch(e){
            alert("Dosya okunamadı!");
        }

    };

    reader.readAsText(file);
});


// 🔥 SCORE
function updateScore(){
    document.getElementById("score").innerText =
    `Korrekt : ${correct} | Forkert : ${wrong}`;
}


// 🔒 MODE (GÜVENLİ)
function setMode(m){

    if(!sentences || sentences.length === 0){
        alert("Önce dosya seç!");
        return;
    }

    mode = m;
    correct = 0;
    wrong = 0;
    updateScore();

    document.getElementById("app").innerHTML = "";
    newExercise();
}


// 🔥 RANDOM
function random(){
    return sentences[Math.floor(Math.random()*sentences.length)];
}


// 🔥 ORDER
function orderExercise(){

    const s = random();
    if(!s) return document.createElement("div");

    const correctWords = s.dk.split(" ");
    const words = [...correctWords].sort(()=>Math.random()-0.5);

    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = "<p>Sæt ordene i den rigtige rækkefølge:</p>";

    const pool = document.createElement("div");
    const target = document.createElement("div");

    pool.className = "drop";
    target.className = "drop";

    function checkLive(){
        const current = Array.from(target.children);

        current.forEach((el,i)=>{
            if(el.innerText === correctWords[i]){
                el.classList.add("correct");
                el.classList.remove("wrong");
            } else {
                el.classList.add("wrong");
                el.classList.remove("correct");
            }
        });
    }

    function createWord(w){
        const el = document.createElement("span");
        el.className = "word";
        el.innerText = w;

        el.onclick = () => {
            if(el.parentElement === pool){
                target.appendChild(el);
            } else {
                pool.appendChild(el);
                el.classList.remove("correct","wrong");
            }
            checkLive();
        };

        return el;
    }

    words.forEach(w=> pool.appendChild(createWord(w)));

    box.appendChild(pool);
    box.appendChild(target);

    const toggleBtn = document.createElement("button");
    toggleBtn.innerText = "🇹🇷 Türkçe Göster";

    const translation = document.createElement("div");
    translation.className = "translation";
    translation.innerText = s.tr;

    toggleBtn.onclick = () => {
        translation.style.display =
            translation.style.display === "none" ? "block" : "none";
    };

    box.appendChild(toggleBtn);
    box.appendChild(translation);

    const btn = document.createElement("button");
    btn.innerText = "Check";

    const result = document.createElement("p");

    btn.onclick = ()=>{

        const user = Array.from(target.children).map(e=>e.innerText).join(" ");

        if(user === s.dk){
            result.innerText = "✅ Korrekt!";
            result.className = "correct-text";
            correct++;
        } else {
            result.innerText = "❌ Yanlış → " + s.dk;
            result.className = "wrong-text";
            wrong++;
        }

        updateScore();
        setTimeout(newExercise, 1200);
    };

    box.appendChild(btn);
    box.appendChild(result);

    return box;
}


// 🔥 QUIZ
function quizExercise(){

    const s = random();
    if(!s) return document.createElement("div");

    let question, correctAnswer, pool;

    if(Math.random()>0.5){
        question = s.dk;
        correctAnswer = s.tr;
        pool = sentences.map(x=>x.tr);
    } else {
        question = s.tr;
        correctAnswer = s.dk;
        pool = sentences.map(x=>x.dk);
    }

    let options = [correctAnswer];

    while(options.length < 4){
        let r = pool[Math.floor(Math.random()*pool.length)];
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box = document.createElement("div");
    box.className="box";

    const q = document.createElement("h3");
    q.innerText = question;
    box.appendChild(q);

    const res = document.createElement("p");

    options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = ()=>{
            if(opt === correctAnswer){
                correct++;
                res.innerText = "✅ Doğru";
            } else {
                wrong++;
                res.innerText = "❌ Yanlış → " + correctAnswer;
            }

            updateScore();
            setTimeout(newExercise, 1200);
        };

        box.appendChild(btn);
    });

    box.appendChild(res);

    return box;
}


// 🔄 NEW
function newExercise(){

    if(!sentences || sentences.length === 0) return;

    const app = document.getElementById("app");

    let newBox = (mode === "order")
        ? orderExercise()
        : quizExercise();

    app.prepend(newBox);

    window.scrollTo({ top: 0, behavior: "smooth" });
}

</script>

</body>
</html>
