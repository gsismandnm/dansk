<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sætningsøvelser</title>

<style>
body { font-family: Arial; padding: 10px; max-width: 900px; margin:auto; }

.header {
display:flex; justify-content:space-between; align-items:center;
border-bottom:1px solid #ddd; padding-bottom:8px; margin-bottom:10px;
}

.header h2 { margin:0; font-size:18px; }

.back-btn {
padding:6px 10px; border:1px solid #ccc; border-radius:6px;
background:white; cursor:pointer;
}

.file-btn {
width:100%; padding:12px; background:#007bff; color:white;
border:none; border-radius:8px; margin-bottom:10px;
}

.box { border:1px solid #ccc; padding:12px; border-radius:10px; margin-bottom:12px; }

.word { display:inline-block; padding:8px 12px; margin:6px; background:#eee; border-radius:6px; cursor:pointer; }
.word.correct { background:lightgreen; }
.word.wrong { background:#f8d7da; }

.drop { border:2px dashed gray; min-height:60px; padding:10px; margin-top:10px; }

button { margin:6px; padding:10px 12px; cursor:pointer; font-size:15px; border:none; border-radius:8px; }

.answer-btn { background:#eee; }
.action-btn { background:#007bff; color:white; }
.meaning-btn { background:#f0ad4e; color:white; }

.quiz-header {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>📘 Sætningsøvelser</h2>
<button class="back-btn" onclick="goHome()">⬅ Tilbage</button>
</div>

<input type="file" id="fileInput" hidden>
<button class="file-btn" onclick="fileInput.click()">📂 Vælg fil</button>

<div>
<button onclick="setMode('order')">🧩 Arrangement</button>
<button onclick="setMode('quiz')">📝 Test</button>
<button onclick="setMode('fill')">✏️ Udfyld</button>
</div>

<p id="stats"></p>
<div id="app"></div>

<script>

function goHome(){
    window.location.href = "index.html";
}

// 🔊
let userInteracted=false;
document.body.addEventListener("click", ()=>userInteracted=true,{once:true});

function speak(text){
    if(!userInteracted) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="da-DK";
    setTimeout(()=>speechSynthesis.speak(u),200);
}

// TOKEN
function tokenize(text){
    return text.match(/[\wæøåÆØÅ']+|[.,!?]/g);
}

// GLOBAL
let words=[];
let mode="order";

let stats = {
  order:{total:0,correct:0,wrong:0},
  quiz:{total:0,correct:0,wrong:0},
  fill:{total:0,correct:0,wrong:0}
};

// 📊
function updateStats(){
    let s = stats[mode];
    let p = s.total ? Math.round(s.correct/s.total*100) : 0;
    document.getElementById("stats").innerText =
    `I alt: ${s.total} | Korrekt: ${s.correct} | Forkert: ${s.wrong} | %${p}`;
}

// 📂 LOAD
fileInput.addEventListener("change", e=>{
    const reader=new FileReader();

    reader.onload=function(ev){
        const sandbox={};

        new Function("sandbox", `
            ${ev.target.result}
            sandbox.data = defaultWords;
        `)(sandbox);

        words = sandbox.data;

        stats = {
          order:{total:0,correct:0,wrong:0},
          quiz:{total:0,correct:0,wrong:0},
          fill:{total:0,correct:0,wrong:0}
        };

        updateStats();
        newExercise();
    };

    reader.readAsText(e.target.files[0]);
});

// MODE
function setMode(m){
    mode=m;
    updateStats();
    newExercise();
}

// RANDOM
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// NEW
function newExercise(){

    if(words.length < 6){
        document.getElementById("app").innerText="En az 6 cümle gerekli!";
        return;
    }

    let box;
    if(mode==="order") box=order();
    if(mode==="quiz") box=quiz();
    if(mode==="fill") box=fill();

    const app=document.getElementById("app");
    app.innerHTML="";
    app.appendChild(box);

    window.scrollTo({top:0, behavior:"smooth"});
}

// 🧩 ORDER (aynı)
function order(){ /* değişmedi */ return quiz(); } // kısalttım burada, mevcut order fonksiyonun aynı kalabilir

// 📝 QUIZ
function quiz(){

    const s=rand(words);

    let options=[s.word];
    while(options.length<6){
        let r=rand(words).word;
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const header=document.createElement("div");
    header.className="quiz-header";

    const speakBtn=document.createElement("button");
    speakBtn.innerText="🔊";
    speakBtn.onclick=()=>speak(s.word);

    const q=document.createElement("div");
    q.innerText="Lyt og vælg";

    header.appendChild(speakBtn);
    header.appendChild(q);
    box.appendChild(header);

    let answered=false;

    const trBtn=document.createElement("button");
    trBtn.className="meaning-btn";
    trBtn.innerText="🇩🇰 Vis betydning";
    trBtn.style.display="none";

    const trText=document.createElement("p");
    trText.style.display="none";
    trText.innerText=s.meaning;

    trBtn.onclick=()=>{
        trText.style.display = trText.style.display==="none" ? "block":"none";
    };

    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(answered) return;
            answered=true;

            let sStats = stats.quiz;
            sStats.total++;

            if(opt===s.word){
                btn.style.background="lightgreen";
                sStats.correct++;
            } else {
                btn.style.background="#f8d7da";
                sStats.wrong++;
            }

            Array.from(box.querySelectorAll(".answer-btn")).forEach(b=>{
                if(b.innerText===s.word){
                    b.style.background="lightgreen";
                }
            });

            trBtn.style.display="inline-block";
            updateStats();
        };

        box.appendChild(btn);
    });

    box.appendChild(trBtn);
    box.appendChild(trText);

    const next=document.createElement("button");
    next.className="action-btn";
    next.innerText="➡️ Næste sætning";
    next.onclick=newExercise;

    box.appendChild(next);

    setTimeout(()=>speak(s.word),1000);

    return box;
}

// ✏️ FILL
function fill(){

    const s=rand(words);
    const tokens=tokenize(s.word);

    let wordIndexes=tokens
        .map((t,i)=>({t,i}))
        .filter(x=>!/^[.,!?]$/.test(x.t));

    let pick=rand(wordIndexes);

    const answer=pick.t;
    tokens[pick.i]="_____";

    let pool=words.flatMap(x=>tokenize(x.word))
        .filter(w=>!/^[.,!?]$/.test(w) && w!==answer);

    let options=[answer];
    while(options.length<6){
        let r=rand(pool);
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const speakBtn=document.createElement("button");
    speakBtn.innerText="🔊";
    speakBtn.onclick=()=>speak(s.word);
    box.appendChild(speakBtn);

    const q=document.createElement("h3");
    q.innerText=tokens.join(" ");
    box.appendChild(q);

    let answered=false;

    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(answered) return;
            answered=true;

            let sStats = stats.fill;
            sStats.total++;

            if(opt===answer){
                btn.style.background="lightgreen";
                sStats.correct++;
            } else {
                btn.style.background="#f8d7da";
                sStats.wrong++;
            }

            Array.from(box.querySelectorAll(".answer-btn")).forEach(b=>{
                if(b.innerText===answer){
                    b.style.background="lightgreen";
                }
            });

            updateStats();
        };

        box.appendChild(btn);
    });

    const trBtn=document.createElement("button");
    trBtn.className="meaning-btn";
    trBtn.innerText="🇩🇰 Vis betydning";

    const trText=document.createElement("p");
    trText.style.display="none";
    trText.innerText=s.meaning;

    trBtn.onclick=()=>{
        trText.style.display = trText.style.display==="none" ? "block":"none";
    };

    box.appendChild(trBtn);
    box.appendChild(trText);

    const next=document.createElement("button");
    next.className="action-btn";
    next.innerText="➡️ Næste sætning";
    next.onclick=newExercise;

    box.appendChild(next);

    return box;
}

</script>

</body>
</html>
