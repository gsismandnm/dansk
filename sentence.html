<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sætningsøvelser</title>

<style>
body { font-family: Arial; padding: 10px; max-width: 900px; margin:auto; }

.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }

.box { border:1px solid #ccc; padding:12px; border-radius:10px; margin-bottom:12px; }

.word { display:inline-block; padding:8px 12px; margin:6px; background:#eee; border-radius:6px; cursor:pointer; }

.drop { border:2px dashed gray; min-height:60px; padding:10px; margin-top:10px; }

button { margin:6px; padding:10px; border-radius:8px; border:none; cursor:pointer; }

.action-btn { background:#007bff; color:white; }

.answer-btn { background:#eee; }

#fileBtn {
    width:100%;
    background:#007bff;
    color:white;
    font-size:16px;
}

/* TOP BAR */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

/* QUIZ GRID */
.answers {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
}

.answers button {
    width:100%;
    padding:14px;
    font-size:16px;
}

/* MOBILE */
@media (max-width:600px){
    .answers{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<div class="header">
<h2>📘 Sætningsøvelser</h2>
<button onclick="goHome()">⬅ Tilbage</button>
</div>

<input type="file" id="fileInput" hidden>
<button id="fileBtn" onclick="document.getElementById('fileInput').click()">📂 Vælg fil</button>

<div>
<button onclick="setMode('order')">🧩 Arrangement</button>
<button onclick="setMode('quiz')">📝 Test</button>
<button onclick="setMode('fill')">✏️ Udfyld</button>
</div>

<p id="stats"></p>
<div id="app"></div>

<script>

const app = document.getElementById("app");
const statsEl = document.getElementById("stats");
const fileInput = document.getElementById("fileInput");

function goHome(){ window.location.href = "index.html"; }

let userInteracted=false;
document.body.addEventListener("click", ()=>userInteracted=true,{once:true});

function speak(text){
    if(!userInteracted) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="da-DK";
    speechSynthesis.speak(u);
}

function tokenize(text){
    return text.match(/[\wæøåÆØÅ']+|[.,!?]/g);
}

let words=[];
let totalQuestions=0;
let mode="order";

let stats={
  order:{total:0,correct:0,wrong:0},
  quiz:{total:0,correct:0,wrong:0},
  fill:{total:0,correct:0,wrong:0}
};

function updateStats(){
    let s=stats[mode];
    let answered=s.total;
    let p=answered?Math.round(s.correct/answered*100):0;

    statsEl.innerText=
    `📊 Toplam:${totalQuestions} | ✏️ Yapılan:${answered} | 🟢 ${s.correct} | 🔴 ${s.wrong} | %${p}`;
}

fileInput.addEventListener("change", e=>{
    const reader=new FileReader();

    reader.onload=function(ev){
        const sandbox={};
        new Function("sandbox", `
            ${ev.target.result}
            sandbox.data = defaultWords;
        `)(sandbox);

        words=sandbox.data;
        totalQuestions=words.length;

        stats={
          order:{total:0,correct:0,wrong:0},
          quiz:{total:0,correct:0,wrong:0},
          fill:{total:0,correct:0,wrong:0}
        };

        updateStats();
        newExercise();
    };

    reader.readAsText(e.target.files[0]);
});

function setMode(m){
    mode=m;
    updateStats();
    newExercise();
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function newExercise(){
    if(words.length<6){
        app.innerText="Vælg en fil!";
        return;
    }

    let box;
    if(mode==="order") box=order();
    if(mode==="quiz") box=quiz();
    if(mode==="fill") box=fill();

    app.innerHTML="";
    app.appendChild(box);
}

/* ORDER */
function order(){
    const s=rand(words);
    const tokens=tokenize(s.word);
    let shuffled=[...tokens].sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const topBar=document.createElement("div");
    topBar.className="top-bar";

    const speakBtn=document.createElement("button");
    speakBtn.innerText="🔊";
    speakBtn.onclick=()=>speak(s.word);

    const next=document.createElement("button");
    next.innerText="➡ Næste";
    next.className="action-btn";

    topBar.appendChild(speakBtn);
    topBar.appendChild(next);
    box.appendChild(topBar);

    const drop=document.createElement("div");
    drop.className="drop";

    const pool=document.createElement("div");

    box.appendChild(drop);
    box.appendChild(pool);

    function checkLive(){
        let userArr=Array.from(drop.children).map(x=>x.innerText);

        Array.from(drop.children).forEach((el,i)=>{
            el.style.background=userArr[i]===tokens[i]?"lightgreen":"#f8d7da";
        });
    }

    shuffled.forEach(w=>{
        const el=document.createElement("span");
        el.className="word";
        el.innerText=w;

        el.onclick=()=>{
            if(el.parentElement===pool) drop.appendChild(el);
            else{
                pool.appendChild(el);
                el.style.background="#eee";
            }
            checkLive();
        };

        pool.appendChild(el);
    });

    next.onclick=()=>{
        let user=Array.from(drop.children).map(x=>x.innerText).join(" ");
        let correct=tokens.join(" ");

        let sStats=stats.order;
        sStats.total++;

        user===correct?sStats.correct++:sStats.wrong++;

        updateStats();
        newExercise();
    };

    return box;
}

/* QUIZ */
function quiz(){
    const s=rand(words);
    let correct=s.word;

    let options=[correct];
    while(options.length<6){
        let r=rand(words).word;
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const topBar=document.createElement("div");
    topBar.className="top-bar";

    const speakBtn=document.createElement("button");
    speakBtn.innerText="🔊";
    speakBtn.onclick=()=>speak(correct);

    const next=document.createElement("button");
    next.innerText="➡ Næste";
    next.className="action-btn";

    topBar.appendChild(speakBtn);
    topBar.appendChild(next);
    box.appendChild(topBar);

    const q=document.createElement("h3");
    q.innerText=s.meaning;
    box.appendChild(q);

    const answersDiv=document.createElement("div");
    answersDiv.className="answers";

    let answered=false;
    let isCorrect=false;

    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(answered) return;
            answered=true;

            setTimeout(()=>{speak(correct);},200);

            if(opt===correct){
                btn.style.background="lightgreen";
                isCorrect=true;
            }else{
                btn.style.background="#f8d7da";

                Array.from(answersDiv.children).forEach(b=>{
                    if(b.innerText===correct){
                        b.style.background="lightgreen";
                    }
                });
            }
        };

        answersDiv.appendChild(btn);
    });

    box.appendChild(answersDiv);

    next.onclick=()=>{
        if(!answered) return;

        let sStats=stats.quiz;
        sStats.total++;

        isCorrect?sStats.correct++:sStats.wrong++;

        updateStats();
        newExercise();
    };

    return box;
}

/* FILL */
function fill(){
    const s=rand(words);
    const tokens=tokenize(s.word);

    let idx=Math.floor(Math.random()*tokens.length);
    let answer=tokens[idx];
    tokens[idx]="_____";

    let options=[answer.toLowerCase()];

    while(options.length<6){
        let r=rand(words).word.split(" ")[0].toLowerCase();
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const topBar=document.createElement("div");
    topBar.className="top-bar";

    const speakBtn=document.createElement("button");
    speakBtn.innerText="🔊";
    speakBtn.onclick=()=>speak(s.word);

    const next=document.createElement("button");
    next.innerText="➡ Næste";
    next.className="action-btn";

    topBar.appendChild(speakBtn);
    topBar.appendChild(next);
    box.appendChild(topBar);

    const q=document.createElement("h3");
    q.innerText=tokens.join(" ");
    box.appendChild(q);

    let answered=false;
    let isCorrect=false;

    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(answered) return;
            answered=true;

            if(opt===answer.toLowerCase()){
                btn.style.background="lightgreen";
                isCorrect=true;
            }else{
                btn.style.background="#f8d7da";

                Array.from(box.children).forEach(el=>{
                    if(el.innerText===answer.toLowerCase()){
                        el.style.background="lightgreen";
                    }
                });
            }
        };

        box.appendChild(btn);
    });

    next.onclick=()=>{
        if(!answered) return;

        let sStats=stats.fill;
        sStats.total++;

        isCorrect?sStats.correct++:sStats.wrong++;

        updateStats();
        newExercise();
    };

    return box;
}

</script>

</body>
</html>
