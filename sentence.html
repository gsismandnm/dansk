<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sætningsøvelser</title>

<style>
body { font-family: Arial; padding: 10px; max-width: 900px; margin:auto; }

.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }

.box { border:1px solid #ccc; padding:12px; border-radius:10px; margin-bottom:12px; }

.word { display:inline-block; padding:8px 12px; margin:6px; background:#eee; border-radius:6px; cursor:pointer; }

.drop { border:2px dashed gray; min-height:60px; padding:10px; margin-top:10px; }

button { margin:6px; padding:10px; border-radius:8px; border:none; cursor:pointer; }

.action-btn { background:#007bff; color:white; }
.answer-btn { background:#eee; }
.meaning-btn { background:#f0ad4e; color:white; }
</style>
</head>

<body>

<div class="header">
<h2>📘 Sætningsøvelser</h2>
<button onclick="goHome()">⬅ Tilbage</button>
</div>

<input type="file" id="fileInput" hidden>
<button onclick="fileInput.click()">📂 Vælg fil</button>

<div>
<button onclick="setMode('order')">🧩 Arrangement</button>
<button onclick="setMode('quiz')">📝 Test</button>
<button onclick="setMode('fill')">✏️ Udfyld</button>
</div>

<p id="stats"></p>
<div id="app"></div>

<script>

// NAV
function goHome(){ window.location.href = "index.html"; }

// SPEAK
let userInteracted=false;
document.body.addEventListener("click", ()=>userInteracted=true,{once:true});

function speak(text){
    if(!userInteracted) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="da-DK";
    speechSynthesis.speak(u);
}

// TOKEN
function tokenize(text){
    return text.match(/[\wæøåÆØÅ']+|[.,!?]/g);
}

// DATA
let words=[];
let mode="order";

let stats = {
  order:{total:0,correct:0,wrong:0},
  quiz:{total:0,correct:0,wrong:0},
  fill:{total:0,correct:0,wrong:0}
};

// STATS
function updateStats(){
    let s=stats[mode];
    let p=s.total?Math.round(s.correct/s.total*100):0;
    stats.innerText=`I alt:${s.total} | ✔:${s.correct} | ✖:${s.wrong} | %${p}`;
}

// LOAD FILE
fileInput.addEventListener("change", e=>{
    const reader=new FileReader();

    reader.onload=function(ev){
        const sandbox={};
        new Function("sandbox", `
            ${ev.target.result}
            sandbox.data = defaultWords;
        `)(sandbox);

        words=sandbox.data;

        stats = {
          order:{total:0,correct:0,wrong:0},
          quiz:{total:0,correct:0,wrong:0},
          fill:{total:0,correct:0,wrong:0}
        };

        updateStats();
        newExercise();
    };

    reader.readAsText(e.target.files[0]);
});

// MODE
function setMode(m){
    mode=m;
    updateStats();
    newExercise();
}

// RANDOM
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// NEW
function newExercise(){
    if(words.length<6){
        app.innerText="Vælg en fil!";
        return;
    }

    let box;
    if(mode==="order") box=order();
    if(mode==="quiz") box=quiz();
    if(mode==="fill") box=fill();

    app.innerHTML="";
    app.appendChild(box);
}

// 🧩 ORDER
function order(){

    const s=rand(words);
    const tokens=tokenize(s.word);

    let shuffled=[...tokens].sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const drop=document.createElement("div");
    drop.className="drop";
    box.appendChild(drop);

    shuffled.forEach(w=>{
        const el=document.createElement("span");
        el.className="word";
        el.innerText=w;
        el.onclick=()=>drop.appendChild(el);
        box.appendChild(el);
    });

    const check=document.createElement("button");
    check.className="action-btn";
    check.innerText="✔ Tjek";

    check.onclick=()=>{
        let user=Array.from(drop.children).map(x=>x.innerText).join(" ");
        let correct=tokens.join(" ");

        let sStats=stats.order;
        sStats.total++;

        if(user===correct){
            drop.style.background="lightgreen";
            sStats.correct++;
        }else{
            drop.style.background="#f8d7da";
            sStats.wrong++;
        }

        updateStats();
    };

    box.appendChild(check);

    return box;
}

// 📝 QUIZ
function quiz(){

    const s=rand(words);

    let options=[s.word];
    while(options.length<6){
        let r=rand(words).word;
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const speakBtn=document.createElement("button");
    speakBtn.innerText="🔊";
    speakBtn.onclick=()=>speak(s.word);
    box.appendChild(speakBtn);

    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            let sStats=stats.quiz;
            sStats.total++;

            if(opt===s.word){
                btn.style.background="lightgreen";
                sStats.correct++;
            }else{
                btn.style.background="#f8d7da";
                sStats.wrong++;
            }

            updateStats();
        };

        box.appendChild(btn);
    });

    return box;
}

// ✏️ FILL
function fill(){

    const s=rand(words);
    const tokens=tokenize(s.word);

    let idx=Math.floor(Math.random()*tokens.length);
    let answer=tokens[idx];
    tokens[idx]="_____";

    let options=[answer];
    while(options.length<6){
        let r=rand(words).word.split(" ")[0];
        if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    const box=document.createElement("div");
    box.className="box";

    const q=document.createElement("h3");
    q.innerText=tokens.join(" ");
    box.appendChild(q);

    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            let sStats=stats.fill;
            sStats.total++;

            if(opt===answer){
                btn.style.background="lightgreen";
                sStats.correct++;
            }else{
                btn.style.background="#f8d7da";
                sStats.wrong++;
            }

            updateStats();
        };

        box.appendChild(btn);
    });

    return box;
}

</script>

</body>
</html>
