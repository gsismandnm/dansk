<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Læseøvelse</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f6fa;
}

/* TOP */
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
}

/* METİN */
.reader {
    height: 50vh;
    overflow: hidden;
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    line-height: 1.8;
    font-size: 20px;
}

.word {
    padding: 2px;
}

.active {
    background: yellow;
    border-radius: 4px;
}

/* ÇEVİRİ */
#translation {
    display: none;
    margin: 10px;
    padding: 10px;
    background: #fff3cd;
    border-radius: 10px;
}

/* KONTROLLER */
.controls {
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

.slider {
    width: 90%;
    margin: 10px;
}
</style>
</head>

<body>

<div class="top-bar">
    <button onclick="goBack()">⬅ Geri</button>
    <input type="file" id="fileInput" accept=".js">
</div>

<select id="textSelect"></select>

<div class="reader" id="reader"></div>

<button onclick="toggleTranslation()">🇹🇷 Çeviri Göster/Gizle</button>
<div id="translation"></div>

<input type="range" min="0.5" max="1.5" step="0.1" value="1" id="speedSlider" class="slider">

<div class="controls">
    <button onclick="rewind()">⏪</button>
    <button onclick="pause()">⏸</button>
    <button onclick="resume()">▶</button>
    <button onclick="forward()">⏩</button>
</div>

<script>

let texts = [];
let words = [];
let currentIndex = 0;
let interval;
let rate = 1;
let utterance;

// GERİ
function goBack(){
    window.location.href = "index.html";
}

// DOSYA
document.getElementById("fileInput").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(){
        eval(reader.result);
        loadTexts();
    };
    reader.readAsText(e.target.files[0]);
});

// TEXT LİSTE
function loadTexts(){
    const select = document.getElementById("textSelect");
    select.innerHTML = "";

    texts.forEach((t,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = t.title;
        select.appendChild(opt);
    });

    select.addEventListener("change", loadSelectedText);
}

// METİN YÜKLE
function loadSelectedText(){
    stopAll();

    const i = document.getElementById("textSelect").value;
    const text = texts[i];

    document.getElementById("translation").innerText = text.tr;

    words = text.da.split(" ");
    const reader = document.getElementById("reader");
    reader.innerHTML = "";

    words.forEach((w, i)=>{
        const span = document.createElement("span");
        span.textContent = w + " ";
        span.classList.add("word");
        span.id = "w"+i;
        reader.appendChild(span);
    });

    currentIndex = 0;

    startReading(text.da);
}

// OKUMA
function startReading(fullText){
    utterance = new SpeechSynthesisUtterance(fullText);
    utterance.lang = "da-DK";
    utterance.rate = rate;

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);

    startHighlight();
}

// HIGHLIGHT + SCROLL
function startHighlight(){
    clearInterval(interval);

    interval = setInterval(()=>{
        if(currentIndex >= words.length){
            clearInterval(interval);
            return;
        }

        document.querySelectorAll(".word").forEach(w=>w.classList.remove("active"));

        const el = document.getElementById("w"+currentIndex);
        if(el){
            el.classList.add("active");

            // AUTO SCROLL
            el.scrollIntoView({behavior:"smooth", block:"center"});
        }

        currentIndex++;

    }, 400 / rate);
}

// DUR
function pause(){
    speechSynthesis.pause();
    clearInterval(interval);
}

// DEVAM
function resume(){
    speechSynthesis.resume();
    startHighlight();
}

// GERİ
function rewind(){
    currentIndex = Math.max(0, currentIndex - 5);
}

// İLERİ
function forward(){
    currentIndex = Math.min(words.length, currentIndex + 5);
}

// HIZ
document.getElementById("speedSlider").addEventListener("input", function(){
    rate = this.value;
    if(utterance){
        startReading(words.join(" "));
    }
});

// ÇEVİRİ
function toggleTranslation(){
    const t = document.getElementById("translation");
    t.style.display = t.style.display === "none" ? "block" : "none";
}

// STOP
function stopAll(){
    speechSynthesis.cancel();
    clearInterval(interval);
}

</script>

</body>
</html>
