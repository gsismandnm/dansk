<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Læseøvelse</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f6fa;
}

/* TOP BAR */
.top-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: white;
    flex-wrap: wrap;
}

.top-bar button {
    padding: 6px;
    font-size: 13px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* SLIDER */
.slider {
    width: 90px;
}

/* READER */
.reader {
    height: 30vh;
    overflow-y: auto;
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    line-height: 1.8;
}

/* SENTENCE */
.sentence {
    padding: 6px;
    margin-bottom: 8px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="top-bar">

    <button onclick="goBack()">⬅ Tilbage</button>

    <input type="file" id="fileInput" accept=".js" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">📂 Vælg fil</button>

    <select id="textSelect"></select>

    <button onclick="startReading()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="resume()">▶️</button>

    <input type="range" min="0.5" max="1.5" step="0.1" value="1" id="speedSlider" class="slider">

    <!-- FONT -->
    <button onclick="decreaseFont()">A-</button>
    <button onclick="increaseFont()">A+</button>

    <button onclick="toggleTranslation()">🇹🇷</button>

</div>

<div class="reader" id="readerDA"></div>
<div class="reader" id="readerTR" style="display:none;"></div>

<script>

let texts = [];
let sentencesDA = [];
let sentencesTR = [];
let rate = 1;
let utterance;
let showTranslation = false;

/* FONT STORAGE */
let fontSize = localStorage.getItem("fontSize") 
    ? parseInt(localStorage.getItem("fontSize")) 
    : 18;

// GERİ
function goBack(){
    stopAll();
    window.location.href = "./index.html";
}

// DOSYA
document.getElementById("fileInput").addEventListener("change", function(e){
    const reader = new FileReader();

    reader.onload = function(){
        try {
            eval(reader.result);
            texts = window.texts || [];
            loadTexts();
        } catch(err){
            alert("Fil fejl!");
        }
    };

    reader.readAsText(e.target.files[0]);
});

// DROPDOWN
function loadTexts(){
    const select = document.getElementById("textSelect");
    select.innerHTML = "";

    texts.forEach((t,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = t.title;
        select.appendChild(opt);
    });

    select.onchange = loadSelectedText;

    if(texts.length){
        select.selectedIndex = 0;
        loadSelectedText();
    }
}

// METİN
function loadSelectedText(){
    stopAll();

    const text = texts[textSelect.value];

    sentencesDA = text.da.match(/[^.!?]+[.!?]+/g) || [text.da];
    sentencesTR = text.tr.match(/[^.!?]+[.!?]+/g) || [text.tr];

    const daDiv = document.getElementById("readerDA");
    const trDiv = document.getElementById("readerTR");

    daDiv.innerHTML = "";
    trDiv.innerHTML = "";

    sentencesDA.forEach((s)=>{
        const div = document.createElement("div");
        div.textContent = s;
        div.className = "sentence";
        daDiv.appendChild(div);
    });

    sentencesTR.forEach((s)=>{
        const div = document.createElement("div");
        div.textContent = s;
        div.className = "sentence";
        trDiv.appendChild(div);
    });

    updateFont();
}

// OKUMA
function startReading(){
    if(!sentencesDA.length) return;

    speechSynthesis.cancel();

    utterance = new SpeechSynthesisUtterance(sentencesDA.join(" "));
    utterance.lang = "da-DK";
    utterance.rate = rate;

    speechSynthesis.speak(utterance);
}

// KONTROLLER
function pause(){
    speechSynthesis.pause();
}

function resume(){
    speechSynthesis.resume();
}

// HIZ
speedSlider.addEventListener("input", function(){
    rate = parseFloat(this.value);
});

// ÇEVİRİ
function toggleTranslation(){
    showTranslation = !showTranslation;
    readerTR.style.display = showTranslation ? "block" : "none";
}

// FONT
function updateFont(){
    document.querySelectorAll(".sentence").forEach(el=>{
        el.style.fontSize = fontSize + "px";
    });
}

function increaseFont(){
    fontSize += 2;
    localStorage.setItem("fontSize", fontSize);
    updateFont();
}

function decreaseFont(){
    fontSize = Math.max(12, fontSize - 2);
    localStorage.setItem("fontSize", fontSize);
    updateFont();
}

// STOP
function stopAll(){
    try{
        speechSynthesis.cancel();
    }catch(e){}
}

// SAYFA ÇIKIŞ
window.addEventListener("beforeunload", stopAll);
window.addEventListener("pagehide", stopAll);

</script>

</body>
</html>
