<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Læseøvelse</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }

.top-bar {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px;
    background:white;
}

.top-bar button {
    padding:10px 14px;
    font-size:16px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    color:white;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
    transition:0.2s;
}

.top-bar button:hover {
    transform:translateY(-2px);
}

.btn-blue { background:linear-gradient(45deg,#3498db,#5dade2); }
.btn-green { background:linear-gradient(45deg,#2ecc71,#58d68d); }
.btn-orange { background:linear-gradient(45deg,#f39c12,#f7b733); }
.btn-purple { background:linear-gradient(45deg,#8e44ad,#bb8fce); }
.btn-dark { background:linear-gradient(45deg,#34495e,#5d6d7e); }

.reader {
    overflow-y:auto;
    background:white;
    margin:10px;
    padding:15px;
    border-radius:12px;
    line-height:1.8;
    height:35vh;
}

.sentence {
    padding:6px;
    margin-bottom:8px;
    border-radius:6px;
}

.active { background:#d4edda; }
.active-tr { background:#fff3cd; }

</style>

</head>

<body>

<div class="top-bar">

<button class="btn-dark" onclick="goBack()">⬅</button>

<input type="file" id="fileInput" hidden>
<button class="btn-blue" onclick="fileInput.click()">📂</button>

<select id="textSelect"></select>

<button class="btn-green" onclick="togglePlay()" id="playBtn">▶</button> <button class="btn-purple" onclick="rewind()">⏪</button> <button class="btn-purple" onclick="forward()">⏩</button>

<input type="range" min="0.5" max="1.5" step="0.1" id="speedSlider">

<button class="btn-dark" onclick="decreaseFont()">A-</button> <button class="btn-dark" onclick="increaseFont()">A+</button>

</div>

<div id="readerDA" class="reader"></div>
<div id="readerTR" class="reader"></div>

<script>

let texts=[];
let sentencesDA=[];
let sentencesTR=[];
let currentIndex=0;
let speaking=false;

let rate = localStorage.getItem("speed") ? parseFloat(localStorage.getItem("speed")) : 1;
let fontSize = localStorage.getItem("fontSize") ? parseInt(localStorage.getItem("fontSize")) : 18;

speedSlider.value = rate;

function goBack(){
    stopAll();
    window.location.href="index.html";
}

fileInput.addEventListener("change", e=>{
    const reader=new FileReader();
    reader.onload=function(){
        eval(reader.result);
        texts=window.texts||[];
        loadTexts();
    };
    reader.readAsText(e.target.files[0]);
});

function loadTexts(){
    textSelect.innerHTML="";
    texts.forEach((t,i)=>{
        let o=document.createElement("option");
        o.value=i;
        o.textContent=t.title;
        textSelect.appendChild(o);
    });
    textSelect.onchange=loadSelectedText;
    loadSelectedText();
}

function loadSelectedText(){
    stopAll();

    const t=texts[textSelect.value];

    sentencesDA = t.da.match(/[^.!?]+[.!?]+/g)||[t.da];
    sentencesTR = t.tr.match(/[^.!?]+[.!?]+/g)||[t.tr];

    readerDA.innerHTML="";
    readerTR.innerHTML="";

    sentencesDA.forEach((s,i)=>{
        let d=document.createElement("div");
        d.textContent=s;
        d.className="sentence";
        d.id="da"+i;
        readerDA.appendChild(d);
    });

    sentencesTR.forEach((s,i)=>{
        let d=document.createElement("div");
        d.textContent=s;
        d.className="sentence";
        d.id="tr"+i;
        readerTR.appendChild(d);
    });

    updateFont();
    currentIndex=0;
}

function togglePlay(){
    const btn=document.getElementById("playBtn");

    if(!speaking && currentIndex===0){
        speaking=true;
        btn.innerText="⏸";
        readSentence();
    }
    else if(speaking){
        speaking=false;
        speechSynthesis.cancel();
        btn.innerText="▶";
    }
    else{
        speaking=true;
        btn.innerText="⏸";
        readSentence();
    }
}

function readSentence(){
    if(!speaking || currentIndex>=sentencesDA.length) return;

    highlight();

    let u=new SpeechSynthesisUtterance(sentencesDA[currentIndex]);
    u.lang="da-DK";
    u.rate=rate;

    u.onend=()=>{
        currentIndex++;
        readSentence();
    };

    speechSynthesis.speak(u);
}

function highlight(){
    document.querySelectorAll(".sentence").forEach(s=>{
        s.classList.remove("active","active-tr");
    });

    let da=document.getElementById("da"+currentIndex);
    let tr=document.getElementById("tr"+currentIndex);

    if(da){
        da.classList.add("active");
        da.scrollIntoView({behavior:"smooth",block:"center"});
    }

    if(tr){
        tr.classList.add("active-tr");
        tr.scrollIntoView({behavior:"smooth",block:"center"});
    }
}

function rewind(){
    currentIndex=Math.max(0,currentIndex-1);
    restart();
}

function forward(){
    currentIndex=Math.min(sentencesDA.length-1,currentIndex+1);
    restart();
}

function restart(){
    speechSynthesis.cancel();
    readSentence();
}

speedSlider.oninput=function(){
    rate=parseFloat(this.value);
    localStorage.setItem("speed",rate);
};

function updateFont(){
    document.querySelectorAll(".sentence").forEach(el=>{
        el.style.fontSize=fontSize+"px";
    });
}

function increaseFont(){
    fontSize+=2;
    localStorage.setItem("fontSize",fontSize);
    updateFont();
}

function decreaseFont(){
    fontSize=Math.max(12,fontSize-2);
    localStorage.setItem("fontSize",fontSize);
    updateFont();
}

function stopAll(){
    speaking=false;
    speechSynthesis.cancel();
    currentIndex=0;
}

</script>

</body>
</html>
