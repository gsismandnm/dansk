<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelime Egzersiz</title>

<style>
body {
    font-family: Arial;
    padding: 10px;
    max-width: 900px;
    margin: auto;
}

.question-box {
    border: 1px solid #ccc;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 10px;
}

.options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 10px;
}

@media (min-width: 600px){
    .options {
        grid-template-columns: repeat(5, 1fr);
    }
}

button {
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
}

/* 📂 DOSYA BUTONU */
.file-btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background-color: #007bff;
    color: white;
    margin-bottom: 10px;
    transition: 0.3s;
}

.file-btn:hover {
    background-color: #0056b3;
}

.file-btn.selected {
    background-color: #28a745;
}

#fileName {
    font-size: 14px;
    margin-bottom: 10px;
}

.correct { color: green; }
.wrong { color: red; }

.top-buttons {
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>📘 Kelime Egzersiz</h2>

<input type="file" id="fileInput" hidden>

<button id="fileButton" class="file-btn" onclick="document.getElementById('fileInput').click()">
📂 Dosya Seç
</button>

<p id="fileName"></p>

<div class="top-buttons">
    <button onclick="setMode('all')">📚 Tüm</button>
    <button onclick="setMode('hard')">🔥 Zor</button>
    <button onclick="resetProgress()">🔄 Sıfırla</button>
</div>

<p id="progress"></p>

<div id="quizContainer"></div>

<script>

let words = [];
let currentFile = "";

let usedWords = [];
let hardWords = [];

let mode = "all";

function getKey(name){
    return name + "_" + currentFile;
}

function loadStorage(){
    usedWords = JSON.parse(localStorage.getItem(getKey("usedWords"))) || [];
    hardWords = JSON.parse(localStorage.getItem(getKey("hardWords"))) || [];
}

function save(){
    localStorage.setItem(getKey("usedWords"), JSON.stringify(usedWords));
    localStorage.setItem(getKey("hardWords"), JSON.stringify(hardWords));
}

// 📂 DOSYA YÜKLE
document.getElementById("fileInput").addEventListener("change", function(e){

    const file = e.target.files[0];
    if(!file) return;

    document.getElementById("fileName").innerText = "Seçilen: " + file.name;
    document.getElementById("fileButton").classList.add("selected");

    const reader = new FileReader();

    reader.onload = function(event){

        try {
            const text = event.target.result;

            const sandbox = {};
            const func = new Function("sandbox", `
                ${text}
                sandbox.data = defaultWords;
            `);

            func(sandbox);

            words = sandbox.data;
            currentFile = file.name;

            loadStorage();
            updateProgress();

            document.getElementById("quizContainer").innerHTML = "";

            if(words.length >= 5){
                newQuestion();
            }

        } catch(e){
            alert("Dosya okunamadı!");
        }

    };

    reader.readAsText(file);
});

function setMode(m){
    mode = m;
    document.getElementById("quizContainer").innerHTML = "";
    newQuestion();
}

function resetProgress(){

    if(!currentFile) return;

    localStorage.removeItem(getKey("usedWords"));
    localStorage.removeItem(getKey("hardWords"));

    loadStorage();
    updateProgress();

    document.getElementById("quizContainer").innerHTML = "";
    newQuestion();
}

function updateProgress(){
    document.getElementById("progress").innerText =
        `Tamamlanan: ${usedWords.length} / ${words.length} | Zor: ${hardWords.length}`;
}

function getPool(){

    if(mode === "hard"){
        return words.filter(w => hardWords.includes(w.word));
    }

    return words.filter(w => !usedWords.includes(w.word));
}

function getRandomWord(){

    let pool = getPool();

    if(pool.length === 0){
        alert("Tüm kelimeler bitti!");
        return null;
    }

    return pool[Math.floor(Math.random()*pool.length)];
}

function newQuestion(){

    const w = getRandomWord();
    if(!w) return;

    let correctAnswer = w.meaning;
    let optionsPool = words.map(x=>x.meaning);

    let options = [correctAnswer];

    while(options.length < 8){
        let rand = optionsPool[Math.floor(Math.random()*optionsPool.length)];
        if(!options.includes(rand)) options.push(rand);
    }

    options.sort(()=>Math.random()-0.5);

    const box = document.createElement("div");
    box.className="question-box";

    const q = document.createElement("h3");
    q.innerText = w.word;
    box.appendChild(q);

    const optionsDiv = document.createElement("div");
    optionsDiv.className = "options";

    const res = document.createElement("p");

    options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = ()=>{

            const all = optionsDiv.querySelectorAll("button");
            all.forEach(b => b.disabled = true);

            if(opt === correctAnswer){
                btn.style.backgroundColor = "lightgreen";
                res.innerText = "✅ Doğru";
                res.className = "correct";
            } else {
                btn.style.backgroundColor = "#f8d7da";
                res.innerText = "❌ " + correctAnswer;
                res.className = "wrong";

                all.forEach(b=>{
                    if(b.innerText === correctAnswer){
                        b.style.backgroundColor = "lightgreen";
                    }
                });
            }

            usedWords.push(w.word);
            save();
            updateProgress();

            setTimeout(newQuestion, 600);
        };

        optionsDiv.appendChild(btn);
    });

    const hardBtn = document.createElement("button");
    hardBtn.innerText = "⭐ Bilemedim";

    hardBtn.onclick = ()=>{
        if(!hardWords.includes(w.word)){
            hardWords.push(w.word);
            save();
            updateProgress();
        }
    };

    box.appendChild(optionsDiv);
    box.appendChild(res);
    box.appendChild(hardBtn);

    document.getElementById("quizContainer").prepend(box);

    window.scrollTo({ top: 0, behavior: "smooth" });
}

</script>

</body>
</html>
