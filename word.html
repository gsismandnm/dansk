<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordøvelse</title>

<style>
body {
    font-family: Arial;
    padding: 10px;
    max-width: 900px;
    margin: auto;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
    padding-bottom: 8px;
    margin-bottom: 10px;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 8px;
}

.header h2 { margin: 0; font-size: 18px; }

#titleInline {
    font-size: 14px;
    font-weight: bold;
    color: #555;
}

/* BACK */
.back-btn {
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
}

/* FILE */
.file-btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    background: #007bff;
    color: white;
    margin-bottom: 10px;
}

/* TOP BUTTONS */
.top-buttons {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
}

.top-buttons button {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: white;
}

/* QUESTION */
.question-box {
    border: 1px solid #ddd;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 8px;
}

.question-box h3 {
    font-size: 20px;
}

/* OPTIONS (BÜYÜTÜLDÜ) */
.options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 12px;
}

@media (min-width: 600px){
    .options {
        grid-template-columns: repeat(4, 1fr);
    }
}

/* OPTION BUTTON */
.options button {
    padding: 16px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: white;
}

/* RESULT */
.correct { color: green; }
.wrong { color: red; }

</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <h2>📚 Danskindlæring</h2>
        <span id="titleInline"></span>
    </div>
    <button class="back-btn" onclick="goHome()">⬅ Tilbage</button>
</div>

<input type="file" id="fileInput" hidden>
<button class="file-btn" onclick="fileInput.click()">📂 Vælg fil</button>

<p id="fileName"></p>

<div class="top-buttons">
    <button onclick="setMode('all')">📚 Alle</button>
    <button onclick="setMode('hard')">⭐ Svære</button>
    <button onclick="setMode('wrong')">❌ Fejl</button>
    <button onclick="resetProgress()">🔄 Nulstil</button>
</div>

<p id="progress"></p>

<div id="quizContainer"></div>

<script>

// 🔊 EN İYİ SES (Sara zorlanır)
function speak(text){

    const utter = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();

    let voice =
        voices.find(v => v.name.includes("Sara") && v.lang === "da-DK") ||
        voices.find(v => v.lang === "da-DK");

    if(voice) utter.voice = voice;

    utter.lang = "da-DK";
    utter.rate = 0.9;

    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
}

// iPhone fix
speechSynthesis.onvoiceschanged = () => {};

function goHome(){
    window.location.href = "index.html";
}

let words = [];
let currentFile = "";
let usedWords = [];
let hardWords = [];
let wrongWords = [];
let mode = "all";

function getKey(name){
    return name + "_" + currentFile;
}

function loadStorage(){
    usedWords = JSON.parse(localStorage.getItem(getKey("usedWords"))) || [];
    hardWords = JSON.parse(localStorage.getItem(getKey("hardWords"))) || [];
    wrongWords = JSON.parse(localStorage.getItem(getKey("wrongWords"))) || [];
}

function save(){
    localStorage.setItem(getKey("usedWords"), JSON.stringify(usedWords));
    localStorage.setItem(getKey("hardWords"), JSON.stringify(hardWords));
    localStorage.setItem(getKey("wrongWords"), JSON.stringify(wrongWords));
}

// FILE LOAD
fileInput.addEventListener("change", e=>{
    const file = e.target.files[0];
    if(!file) return;

    fileName.innerText = "Valgt: " + file.name;

    const reader = new FileReader();

    reader.onload = e=>{
        try {
            const sandbox = {};
            const func = new Function("sandbox", `
                ${e.target.result}
                sandbox.data = defaultWords;
                sandbox.title = typeof title !== 'undefined' ? title : "";
            `);

            func(sandbox);

            words = sandbox.data;
            currentFile = file.name;

            titleInline.innerText = sandbox.title || "";

            loadStorage();
            updateProgress();

            quizContainer.innerHTML = "";
            newQuestion();

        } catch {
            alert("Dosya okunamadı!");
        }
    };

    reader.readAsText(file);
});

function setMode(m){
    mode = m;
    quizContainer.innerHTML = "";
    newQuestion();
}

function resetProgress(){
    if(!currentFile) return;

    localStorage.clear();
    loadStorage();
    updateProgress();

    quizContainer.innerHTML = "";
    newQuestion();
}

function updateProgress(){
    progress.innerText =
        `✔ ${usedWords.length}/${words.length} | ⭐ ${hardWords.length} | ❌ ${wrongWords.length}`;
}

function getPool(){
    if(mode === "hard") return words.filter(w => hardWords.includes(w.word));
    if(mode === "wrong") return words.filter(w => wrongWords.includes(w.word));
    return words.filter(w => !usedWords.includes(w.word));
}

function getRandomWord(){
    const pool = getPool();
    if(pool.length === 0){
        alert("Alle ordene er færdige!");
        return null;
    }
    return pool[Math.floor(Math.random()*pool.length)];
}

// 🔥 QUESTION
function newQuestion(nextWord = null){

    const w = nextWord || getRandomWord();
    if(!w) return;

    const correctAnswer = w.meaning;

    let options = [correctAnswer];
    const pool = [...new Set(words.map(x=>x.meaning))];

    while(options.length < 8){
        let r = pool[Math.floor(Math.random()*pool.length)];
        if(r !== correctAnswer && !options.includes(r)){
            options.push(r);
        }
    }

    options.sort(()=>Math.random()-0.5);

    const box = document.createElement("div");
    box.className = "question-box";

    const q = document.createElement("h3");
    q.innerText = w.word;

    const speakBtn = document.createElement("button");
    speakBtn.innerText = "🔊";
    speakBtn.style.marginLeft = "10px";
    speakBtn.onclick = ()=> speak(w.word);

    q.appendChild(speakBtn);
    box.appendChild(q);

    const optionsDiv = document.createElement("div");
    optionsDiv.className = "options";

    const res = document.createElement("p");

    options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = ()=>{

            optionsDiv.querySelectorAll("button").forEach(b=>b.disabled=true);

            if(opt === correctAnswer){

                btn.style.backgroundColor = "lightgreen";
                res.innerText = "✅ Korrekt";

                speak(w.word);

                if(!usedWords.includes(w.word)){
                    usedWords.push(w.word);
                }

                wrongWords = wrongWords.filter(x=>x!==w.word);

                save();
                updateProgress();

                setTimeout(newQuestion, 800);

            } else {

                btn.style.backgroundColor = "#f8d7da";
                res.innerText = "❌ " + correctAnswer;

                if(!wrongWords.includes(w.word)){
                    wrongWords.push(w.word);
                }

                save();
                updateProgress();

                const next = getRandomWord();

                if(next){
                    speak(next.word);
                    setTimeout(()=> newQuestion(next), 800);
                } else {
                    setTimeout(newQuestion, 800);
                }
            }
        };

        optionsDiv.appendChild(btn);
    });

    box.appendChild(optionsDiv);
    box.appendChild(res);

    quizContainer.prepend(box);
}

</script>

</body>
</html>
